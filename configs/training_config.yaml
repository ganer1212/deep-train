# Training Configuration
model:
  name: "transformer-base"
  hidden_size: 2048
  num_layers: 24

training:
  batch_size: 32
  learning_rate: 1e-4
  max_steps: 100000
  device: "cuda"
  mixed_precision: "bf16"
  
  # Set via encrypted config or environment variables
  # server: ""
  # address: ""

logging:
  log_dir: "./logs"
  tensorboard: true
